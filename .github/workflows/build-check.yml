name: Build Check

on:
  push:
    branches: ['*']

jobs:
  build:
    name: Compile Check
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-v2-${{ hashFiles('Podfile') }}
          restore-keys: pods-v2-

      - name: Install CocoaPods
        run: pod install --repo-update

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WoofWalk.xcworkspace \
            -scheme WoofWalk \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            2>&1 | tee build.log | xcpretty

      - name: Boot simulator
        run: |
          xcrun simctl boot "iPhone 15" || true
          sleep 5
          xcrun simctl status_bar "iPhone 15" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularMode active \
            --cellularBars 4 \
            --wifiBars 3

      - name: Install app in simulator
        run: |
          xcrun simctl install "iPhone 15" build/WoofWalk.app
          sleep 2

      - name: Launch app and capture screenshots
        run: |
          mkdir -p screenshots

          # Launch the app
          xcrun simctl launch "iPhone 15" com.woofwalk.ios
          sleep 8

          # Screenshot 1: Launch / Login screen
          xcrun simctl io "iPhone 15" screenshot screenshots/01-launch.png
          echo "Captured: Launch screen"

          # Try navigating via deep links or just capture what's visible
          sleep 3
          xcrun simctl io "iPhone 15" screenshot screenshots/02-main.png
          echo "Captured: Main screen"

          # Tap around using simctl - simulate home button to get different states
          # Send the app to background and back
          xcrun simctl launch "iPhone 15" com.woofwalk.ios
          sleep 3
          xcrun simctl io "iPhone 15" screenshot screenshots/03-app-state.png
          echo "Captured: App state"

          # List all screenshots
          echo "=== Screenshots captured ==="
          ls -la screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
