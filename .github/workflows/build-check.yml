name: Build Check

on:
  push:
    branches: ['*']

jobs:
  build:
    name: Compile Check
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-v2-${{ hashFiles('Podfile') }}
          restore-keys: pods-v2-

      - name: Install CocoaPods
        run: pod install --repo-update

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WoofWalk.xcworkspace \
            -scheme WoofWalk \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log | xcpretty

      - name: Find built app
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WoofWalk.app" -path "*/Debug-iphonesimulator/*" | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Boot simulator and capture screenshots
        run: |
          mkdir -p screenshots

          # Boot simulator
          xcrun simctl boot "iPhone 15" || true
          sleep 5

          # Clean status bar
          xcrun simctl status_bar "iPhone 15" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularMode active \
            --cellularBars 4 \
            --wifiBars 3

          # Install and launch
          xcrun simctl install "iPhone 15" "${{ steps.app.outputs.path }}"
          sleep 2
          xcrun simctl launch "iPhone 15" com.woofwalk.ios
          sleep 8

          # Capture screenshots
          xcrun simctl io "iPhone 15" screenshot screenshots/01-launch.png
          echo "Captured: Launch/Login screen"

          sleep 3
          xcrun simctl io "iPhone 15" screenshot screenshots/02-after-delay.png
          echo "Captured: After delay"

          xcrun simctl launch "iPhone 15" com.woofwalk.ios
          sleep 3
          xcrun simctl io "iPhone 15" screenshot screenshots/03-relaunch.png
          echo "Captured: Relaunch"

          echo "=== Screenshots ==="
          ls -la screenshots/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
