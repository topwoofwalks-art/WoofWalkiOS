name: Build Check

on:
  push:
    branches: ['*']

jobs:
  build:
    name: Compile Check
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-v2-${{ hashFiles('Podfile') }}
          restore-keys: pods-v2-

      - name: Install CocoaPods
        run: pod install --repo-update

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WoofWalk.xcworkspace \
            -scheme WoofWalk \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log | xcpretty

      - name: Find built app
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WoofWalk.app" -path "*/Debug-iphonesimulator/*" | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH" || echo "App not found!"

      - name: Boot simulator and capture screenshots
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          mkdir -p screenshots

          # Boot simulator
          xcrun simctl boot "iPhone 15" || true
          sleep 5

          # Clean status bar
          xcrun simctl status_bar "iPhone 15" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularMode active \
            --cellularBars 4 \
            --wifiBars 3

          # Install app
          xcrun simctl install "iPhone 15" "${{ steps.app.outputs.path }}"
          sleep 2

          # Launch in screenshot mode with credentials
          xcrun simctl launch "iPhone 15" com.woofwalk.ios \
            -screenshot-mode 2>&1 || true

          # Also set env vars for the app via simctl spawn
          # Note: simctl launch doesn't pass env vars, so the app reads from UserDefaults instead
          # Let's use a different approach - write a plist with the creds
          xcrun simctl spawn "iPhone 15" defaults write com.woofwalk.ios TEST_EMAIL "$TEST_EMAIL"
          xcrun simctl spawn "iPhone 15" defaults write com.woofwalk.ios TEST_PASSWORD "$TEST_PASSWORD"

          # Relaunch with screenshot mode
          xcrun simctl terminate "iPhone 15" com.woofwalk.ios 2>/dev/null || true
          sleep 1
          xcrun simctl launch "iPhone 15" com.woofwalk.ios -screenshot-mode

          # Wait for app to launch and show login
          sleep 5
          xcrun simctl io "iPhone 15" screenshot screenshots/01-login-screen.png
          echo "Captured: Login screen"

          # Wait for auto-sign-in (automation handles this)
          sleep 10
          xcrun simctl io "iPhone 15" screenshot screenshots/02-after-signin.png
          echo "Captured: After sign-in"

          # Wait for tab navigation (automation cycles through tabs)
          sleep 8
          xcrun simctl io "iPhone 15" screenshot screenshots/03-map-tab.png
          echo "Captured: Map tab"

          sleep 8
          xcrun simctl io "iPhone 15" screenshot screenshots/04-social-tab.png
          echo "Captured: Social tab"

          sleep 8
          xcrun simctl io "iPhone 15" screenshot screenshots/05-discover-tab.png
          echo "Captured: Discover tab"

          sleep 8
          xcrun simctl io "iPhone 15" screenshot screenshots/06-profile-tab.png
          echo "Captured: Profile tab"

          sleep 5
          xcrun simctl io "iPhone 15" screenshot screenshots/07-final.png
          echo "Captured: Final state"

          echo "=== All screenshots ==="
          ls -la screenshots/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
