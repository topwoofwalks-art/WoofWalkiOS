name: Build Check

on:
  push:
    branches: ['*']

jobs:
  build:
    name: Compile Check
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Add GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_PLIST" ]; then
            echo "$GOOGLE_SERVICE_PLIST" | base64 --decode > WoofWalk/GoogleService-Info.plist
            echo "GoogleService-Info.plist added from secret"
          else
            echo "No Firebase secret set - app will run without Firebase"
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-v2-${{ hashFiles('Podfile') }}
          restore-keys: pods-v2-

      - name: Install CocoaPods
        run: pod install --repo-update

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace WoofWalk.xcworkspace \
            -scheme WoofWalk \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            2>&1 | tee build.log | xcpretty

      - name: Find built app and inject plist
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WoofWalk.app" -path "*/Debug-iphonesimulator/*" | head -1)
          echo "path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          # Ensure GoogleService-Info.plist is in the bundle
          if [ -f WoofWalk/GoogleService-Info.plist ]; then
            cp WoofWalk/GoogleService-Info.plist "$APP_PATH/GoogleService-Info.plist"
            echo "Injected GoogleService-Info.plist into app bundle"
          fi
          ls "$APP_PATH/GoogleService-Info.plist" 2>/dev/null && echo "Plist confirmed in bundle" || echo "WARNING: No plist in bundle"

      - name: Capture simulator screenshots
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          mkdir -p screenshots

          # Boot simulator
          xcrun simctl boot "iPhone 15" || true
          sleep 5

          # Clean status bar
          xcrun simctl status_bar "iPhone 15" override \
            --time "9:41" \
            --batteryState charged \
            --batteryLevel 100 \
            --cellularMode active \
            --cellularBars 4 \
            --wifiBars 3

          # Install app
          xcrun simctl install "iPhone 15" "${{ steps.app.outputs.path }}"
          sleep 2

          # Grant all permissions before launch
          xcrun simctl privacy "iPhone 15" grant all com.woofwalk.ios
          xcrun simctl privacy "iPhone 15" grant location-always com.woofwalk.ios
          xcrun simctl privacy "iPhone 15" grant photos com.woofwalk.ios
          xcrun simctl privacy "iPhone 15" grant camera com.woofwalk.ios
          xcrun simctl privacy "iPhone 15" grant notifications com.woofwalk.ios

          # Write test credentials to app UserDefaults
          xcrun simctl spawn "iPhone 15" defaults write com.woofwalk.ios TEST_EMAIL "${TEST_EMAIL:-}" || true
          xcrun simctl spawn "iPhone 15" defaults write com.woofwalk.ios TEST_PASSWORD "${TEST_PASSWORD:-}" || true

          # Launch app in screenshot mode and stream logs
          xcrun simctl launch "iPhone 15" com.woofwalk.ios -screenshot-mode
          echo "App launched, waiting for automation..."

          # Wait for app to fully load and render first tab (map)
          sleep 8
          xcrun simctl io "iPhone 15" screenshot screenshots/01-map-tab.png
          echo "Captured: Map tab"

          # Automation cycles: map(already captured) -> social -> discover -> profile
          # Each tab has 5s delay, so: social at ~10s, discover at ~15s, profile at ~20s
          sleep 7
          xcrun simctl io "iPhone 15" screenshot screenshots/02-social-tab.png
          echo "Captured: Social tab"

          sleep 7
          xcrun simctl io "iPhone 15" screenshot screenshots/03-discover-tab.png
          echo "Captured: Discover tab"

          sleep 7
          xcrun simctl io "iPhone 15" screenshot screenshots/04-profile-tab.png
          echo "Captured: Profile tab"

          # Automation goes back to map
          sleep 5
          xcrun simctl io "iPhone 15" screenshot screenshots/05-map-final.png
          echo "Captured: Map final"

          # Dump app logs to see automation progress
          xcrun simctl spawn "iPhone 15" log show \
            --predicate 'process == "WoofWalk"' \
            --last 60s --style compact 2>/dev/null | grep "ScreenshotAutomation" || echo "No automation logs found"

          echo "=== Screenshots ==="
          ls -la screenshots/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
