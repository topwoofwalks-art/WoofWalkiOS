name: TestFlight

# Triggered manually for now. After we trust the pipeline we can flip to
# `on: push` for the `main` branch.
on:
  workflow_dispatch:
    inputs:
      bootstrap_certs:
        description: "First-time cert bootstrap (regenerates if missing). Leave OFF for normal builds."
        type: boolean
        default: false

jobs:
  testflight:
    name: Build + upload to TestFlight
    runs-on: macos-14
    env:
      # All credentials supplied via GitHub Secrets — see repo Settings → Secrets and variables → Actions.
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      # Personal-access token (or GitHub App token) with read-write access
      # to the woofwalk-ios-certs repo. Used by `match` to push/pull the
      # encrypted cert+profile store. Format: base64("username:token").
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Default to readonly so concurrent CI runs don't race to regenerate.
      # Flipped to false when the manual trigger sets bootstrap_certs.
      MATCH_READONLY: ${{ github.event.inputs.bootstrap_certs == 'true' && 'false' || 'true' }}

    steps:
      - name: Checkout iOS repo
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Restore Firebase config
        env:
          GOOGLE_SERVICE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret is missing — Firebase init will skip and crashlytics/messaging won't work."
            exit 1
          fi
          echo "$GOOGLE_SERVICE_PLIST" | base64 --decode > WoofWalk/GoogleService-Info.plist

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          # pods-v3 — cache-bust after pinning CocoaPods to 1.15.2.
          # pods-v2 cache contained 1.16.x-generated frameworks.sh with
          # the "source: unbound variable" regression even after the
          # Gemfile pin landed.
          key: pods-v3-${{ hashFiles('Podfile.lock', 'Podfile', 'Gemfile') }}
          restore-keys: pods-v3-

      - name: Cache Ruby gems (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        # Use bundle exec so the pinned CocoaPods version in Gemfile
        # (currently 1.15.2 — see Gemfile for context) is used instead
        # of whatever the macos-14 image ships system-wide.
        run: bundle exec pod install --repo-update

      - name: Patch Pods-WoofWalk-frameworks.sh
        # The script generated by CocoaPods has a bash strict-mode bug
        # at line 42 — install_framework() declares `local source` only
        # inside conditional branches, so under `set -u` an unmatched
        # branch leaves `${source}` unbound and aborts the embed phase.
        # Surgically inject `local source=""` at function entry so the
        # variable is always defined.
        run: |
          SCRIPT="Pods/Target Support Files/Pods-WoofWalk/Pods-WoofWalk-frameworks.sh"
          if [ ! -f "$SCRIPT" ]; then
            echo "::warning::$SCRIPT not found — skipping patch"
            exit 0
          fi
          if grep -q 'patched: avoid set -u unbound abort' "$SCRIPT"; then
            echo "Already patched"
            exit 0
          fi
          # Insert `local source=""` after the install_framework() opening brace.
          # Use a python helper for cross-platform-safe in-place editing.
          python3 - <<'PY'
          path = "Pods/Target Support Files/Pods-WoofWalk/Pods-WoofWalk-frameworks.sh"
          with open(path, "r") as f:
              contents = f.read()
          new = contents.replace(
              "install_framework()\n{",
              'install_framework()\n{\n  local source=""  # patched: avoid set -u unbound abort'
          )
          if new == contents:
              # Try alternate brace styles
              new = contents.replace(
                  "install_framework() {",
                  'install_framework() {\n  local source=""  # patched: avoid set -u unbound abort'
              )
          with open(path, "w") as f:
              f.write(new)
          print(f"Patched {path}")
          PY
          # Verify
          head -50 "$SCRIPT" | grep -A 2 "install_framework"

      - name: Disable user-script sandboxing on WoofWalk target
        # Xcode 15.4 enables script-phase sandboxing by default, which
        # blocks the [CP] Embed Pods Frameworks rsync from reading
        # project paths. Toggle off on the consuming target's config.
        run: |
          /usr/libexec/PlistBuddy -c "Print" WoofWalk.xcodeproj/project.pbxproj > /dev/null 2>&1 || true
          # Use plutil to flip the build setting via xcodebuild's xcconfig override.
          # Simpler: use ruby + xcodeproj.
          bundle exec ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open("WoofWalk.xcodeproj")
            proj.targets.each do |t|
              t.build_configurations.each do |c|
                c.build_settings["ENABLE_USER_SCRIPT_SANDBOXING"] = "NO"
              end
            end
            proj.save
            puts "ENABLE_USER_SCRIPT_SANDBOXING=NO applied to all WoofWalk targets"
          '

      - name: Bootstrap certs (if requested)
        if: ${{ github.event.inputs.bootstrap_certs == 'true' }}
        run: bundle exec fastlane certs
        # On bootstrap match generates the Distribution cert + provisioning
        # profiles via the ASC API and pushes them encrypted to the certs
        # repo. Only needed the first time, or after a cert rotation.

      - name: Build + upload to TestFlight
        run: bundle exec fastlane beta

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-build-log
          path: |
            ~/Library/Logs/gym/*.log
            fastlane/test_output
