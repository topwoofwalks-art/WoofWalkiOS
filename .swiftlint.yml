disabled_rules:
  - trailing_whitespace
  - line_length
  - force_cast
  - force_try

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_imports

excluded:
  - Pods
  - DerivedData
  - .build
  - .swiftpm
  - WoofWalkWatch

type_name:
  excluded:
    - WoofWalkApp_DI_Example

line_length:
  warning: 150
  error: 200
  ignores_comments: true

file_length:
  warning: 800
  error: 1500

type_body_length:
  warning: 500
  error: 900

function_body_length:
  warning: 80
  error: 400

cyclomatic_complexity:
  warning: 15
  error: 80

nesting:
  type_level: 2

large_tuple:
  warning: 3
  error: 5

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - db
    - x
    - y
    - z
    - i
    - area_m2
    - public_
    - animal_cruelty

reporter: "xcode"
