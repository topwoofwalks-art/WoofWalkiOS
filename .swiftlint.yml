disabled_rules:
  - trailing_whitespace
  - line_length
  - force_cast
  - force_try

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_imports

excluded:
  - Pods
  - DerivedData
  - .build
  - .swiftpm

line_length:
  warning: 150
  error: 200
  ignores_comments: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level: 2

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - db
    - x
    - y
    - z

reporter: "xcode"
